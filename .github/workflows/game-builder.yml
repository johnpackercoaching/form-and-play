name: Game Builder
on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Firestore build request document ID'
        required: true
        type: string
      request_text:
        description: 'The user build request text'
        required: true
        type: string
      game_id:
        description: 'Target game ID (empty for new game)'
        required: false
        type: string
      user_email:
        description: 'Email of the user who submitted the request'
        required: false
        type: string
      user_name:
        description: 'Name of the user who submitted the request'
        required: false
        type: string
  workflow_call:
    inputs:
      build_id:
        description: 'Firestore build request document ID'
        required: true
        type: string
      request_text:
        description: 'The user build request text'
        required: true
        type: string
      game_id:
        description: 'Target game ID (empty for new game)'
        required: false
        type: string
      user_email:
        description: 'Email of the user who submitted the request'
        required: false
        type: string
      user_name:
        description: 'Name of the user who submitted the request'
        required: false
        type: string

jobs:
  game-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies and Claude Code CLI
        run: npm ci && npm install -g @anthropic-ai/claude-code

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Setup environment
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-service-account.json" >> $GITHUB_ENV
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Pre-validate Claude Code authentication
        id: pre-validate
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if timeout 30 claude -p "test" --max-turns 1 > /dev/null 2>&1; then
            echo "credits_ok=true" >> $GITHUB_OUTPUT
            echo "Claude Code authentication OK"
          else
            echo "credits_ok=false" >> $GITHUB_OUTPUT
            echo "Claude Code authentication failed"
          fi

      - name: Fail early if auth failed
        if: steps.pre-validate.outputs.credits_ok == 'false'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json
        run: |
          node scripts/update-build-status.js \
            --build-id "${{ inputs.build_id }}" \
            --status "failed" \
            --fix-description "Claude authentication failed." || true
          echo "::error::Claude Code authentication failed"
          exit 1

      - name: Write build input
        run: |
          cat > /tmp/game-edit-input.json << 'JSONEOF'
          ${{ toJSON(inputs) }}
          JSONEOF
          echo "Build input written to /tmp/game-edit-input.json"
          cat /tmp/game-edit-input.json

      # ═══════════════════════════════════════════════════════════
      # PHASE 1: BUILD THE GAME
      # ═══════════════════════════════════════════════════════════
      - name: Run Claude Game Builder
        id: claude-build
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json
        run: |
          PROMPT=$(cat .claude/game-builder-prompt.md)

          claude -p "$PROMPT" \
            --model opus \
            --output-format stream-json \
            --verbose \
            --allowedTools "Task,Read,Edit,Write,Bash,Glob,Grep,WebFetch,WebSearch" \
            --dangerously-skip-permissions \
            2>&1 | tee claude-build-output.txt

          if [ -f build-result.json ]; then
            STATUS=$(python3 -c "import json; d=json.load(open('build-result.json')); print(d.get('status','failed'))" 2>/dev/null || echo "failed")
            DESCRIPTION=$(python3 -c "import json; d=json.load(open('build-result.json')); print(d.get('description',''))" 2>/dev/null || echo "")
          else
            STATUS="failed"
            DESCRIPTION="Claude did not produce build-result.json."
          fi

          echo "build_status=$STATUS" >> $GITHUB_OUTPUT
          echo "build_description=$DESCRIPTION" >> $GITHUB_OUTPUT

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: game-build-log-${{ inputs.build_id }}
          path: |
            claude-build-output.txt
            build-result.json
          retention-days: 30
          if-no-files-found: warn

      - name: Determine game to test
        if: steps.claude-build.outputs.build_status == 'completed'
        id: qa-target
        run: |
          GAME_ID=""
          if [ -f build-result.json ]; then
            GAME_ID=$(python3 -c "import json; d=json.load(open('build-result.json')); print(d.get('game_id',''))" 2>/dev/null || echo "")
          fi
          if [ -z "$GAME_ID" ]; then
            GAME_ID=$(ls -td src/games/[0-9]* 2>/dev/null | head -1 | xargs -I{} basename {} 2>/dev/null || echo "")
          fi
          echo "game_id=$GAME_ID" >> $GITHUB_OUTPUT
          echo "QA target: $GAME_ID"

      - name: Start dev server for QA
        if: steps.claude-build.outputs.build_status == 'completed' && steps.qa-target.outputs.game_id != ''
        run: |
          npx vite --port 5175 --strictPort &
          echo $! > /tmp/devserver.pid
          for i in $(seq 1 60); do
            if curl -s http://localhost:5175 > /dev/null 2>&1; then
              echo "Dev server ready (took ${i}s)"
              break
            fi
            sleep 1
          done

      - name: Generate game thumbnail
        if: steps.claude-build.outputs.build_status == 'completed' && steps.qa-target.outputs.game_id != ''
        id: gen-thumbnail
        run: |
          GAME_ID="${{ steps.qa-target.outputs.game_id }}"
          mkdir -p public/thumbnails

          GAME_ID_ENV="$GAME_ID" node -e "
          const { chromium } = require('playwright');
          (async () => {
            const gameId = process.env.GAME_ID_ENV;
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1280, height: 720 } });
            try {
              await page.goto('http://localhost:5175', { waitUntil: 'domcontentloaded', timeout: 30000 });
              await page.waitForSelector('.game-card', { timeout: 15000 });
              const card = await page.waitForSelector('[data-game-id=\"' + gameId + '\"]', { timeout: 10000 });
              await card.click();
              const canvas = await page.waitForSelector('canvas', { timeout: 15000 });
              await new Promise(r => setTimeout(r, 5000));
              await canvas.screenshot({ path: 'public/thumbnails/' + gameId + '.png' });
              console.log('Thumbnail saved');
            } catch (err) {
              console.log('FAIL: ' + err.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          " 2>&1
          echo "thumbnail_generated=$([[ $? -eq 0 ]] && echo true || echo false)" >> $GITHUB_OUTPUT

      # ═══════════════════════════════════════════════════════════
      # PHASE 2: COMPREHENSIVE QA (Claude Code-driven)
      # Claude reads the game source + meta.json, generates
      # game-specific Playwright tests, runs them, and fixes
      # bugs iteratively until all tests pass.
      # ═══════════════════════════════════════════════════════════
      - name: Comprehensive gameplay QA
        if: steps.claude-build.outputs.build_status == 'completed' && steps.qa-target.outputs.game_id != ''
        id: gameplay-qa
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          GAME_ID="${{ steps.qa-target.outputs.game_id }}"
          echo "Running comprehensive QA for: $GAME_ID"
          echo "$GAME_ID" > /tmp/qa-target.txt

          QA_PROMPT=$(cat .claude/game-qa-prompt.md)

          # Prepend the game ID context
          FULL_PROMPT="The game to QA test is: ${GAME_ID}

          The dev server is already running at http://localhost:5175.

          Read the game source at src/games/${GAME_ID}/index.ts and src/games/${GAME_ID}/meta.json first.
          Then follow the QA prompt below exactly.

          ${QA_PROMPT}"

          claude -p "$FULL_PROMPT" \
            --model opus \
            --output-format stream-json \
            --verbose \
            --allowedTools "Task,Read,Edit,Write,Bash,Glob,Grep" \
            --dangerously-skip-permissions \
            2>&1 | tee claude-qa-output.txt

          # Check QA result
          if [ -f qa-result.json ]; then
            QA_STATUS=$(python3 -c "import json; d=json.load(open('qa-result.json')); print(d.get('status','failed'))" 2>/dev/null || echo "failed")
            BUGS_FOUND=$(python3 -c "import json; d=json.load(open('qa-result.json')); print(d.get('bugs_found',0))" 2>/dev/null || echo "0")
            BUGS_FIXED=$(python3 -c "import json; d=json.load(open('qa-result.json')); print(d.get('bugs_fixed',0))" 2>/dev/null || echo "0")
            TESTS_PASSED=$(python3 -c "import json; d=json.load(open('qa-result.json')); print(d.get('tests_passed',0))" 2>/dev/null || echo "0")
            TESTS_TOTAL=$(python3 -c "import json; d=json.load(open('qa-result.json')); print(d.get('tests_total',0))" 2>/dev/null || echo "0")
          else
            QA_STATUS="failed"
            BUGS_FOUND="unknown"
            BUGS_FIXED="unknown"
            TESTS_PASSED="0"
            TESTS_TOTAL="0"
          fi

          echo "qa_status=$QA_STATUS" >> $GITHUB_OUTPUT
          echo "bugs_found=$BUGS_FOUND" >> $GITHUB_OUTPUT
          echo "bugs_fixed=$BUGS_FIXED" >> $GITHUB_OUTPUT
          echo "tests_passed=$TESTS_PASSED" >> $GITHUB_OUTPUT
          echo "tests_total=$TESTS_TOTAL" >> $GITHUB_OUTPUT
          echo "QA Result: $QA_STATUS ($TESTS_PASSED/$TESTS_TOTAL tests, $BUGS_FOUND bugs found, $BUGS_FIXED fixed)"

          if [ "$QA_STATUS" != "passed" ]; then
            echo "::warning::Comprehensive QA failed for $GAME_ID"
          fi

      - name: Upload QA log
        if: always() && steps.qa-target.outputs.game_id != ''
        uses: actions/upload-artifact@v4
        with:
          name: game-qa-log-${{ inputs.build_id }}
          path: |
            claude-qa-output.txt
            qa-result.json
            tests/game-qa-*.spec.ts
          retention-days: 30
          if-no-files-found: warn

      - name: Stop dev server
        if: always()
        run: |
          if [ -f /tmp/devserver.pid ]; then
            kill $(cat /tmp/devserver.pid) 2>/dev/null || true
            rm -f /tmp/devserver.pid
          fi

      # ═══════════════════════════════════════════════════════════
      # PHASE 3: SHIP IT (only if QA passed)
      # ═══════════════════════════════════════════════════════════
      - name: Clean up agent artifacts before PR
        if: steps.claude-build.outputs.build_status == 'completed'
        run: |
          rm -f claude-build-output.txt claude-qa-output.txt build-result.json qa-result.json
          # Keep the generated test file -- it's part of the deliverable
          echo "Removed agent artifacts"

      - name: Create Pull Request
        if: steps.claude-build.outputs.build_status == 'completed' && steps.gameplay-qa.outputs.qa_status == 'passed'
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          branch: game-build/${{ inputs.build_id }}
          title: "Game Build: ${{ inputs.build_id }}"
          delete-branch: true
          body: |
            ## Game Build Request

            **Build ID:** `${{ inputs.build_id }}`

            **Request:**
            > ${{ inputs.request_text }}

            **What was built:**
            ${{ steps.claude-build.outputs.build_description }}

            **QA Results:**
            - Status: ${{ steps.gameplay-qa.outputs.qa_status }}
            - Tests: ${{ steps.gameplay-qa.outputs.tests_passed }}/${{ steps.gameplay-qa.outputs.tests_total }} passing
            - Bugs found: ${{ steps.gameplay-qa.outputs.bugs_found }}
            - Bugs fixed: ${{ steps.gameplay-qa.outputs.bugs_fixed }}

            ---
            Generated by Form & Play Game Builder.
          labels: game-builder

      - name: Create PR with QA warning
        if: steps.claude-build.outputs.build_status == 'completed' && steps.gameplay-qa.outputs.qa_status != 'passed'
        id: create-pr-qa-warn
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          branch: game-build/${{ inputs.build_id }}
          title: "[QA ISSUES] Game Build: ${{ inputs.build_id }}"
          delete-branch: true
          body: |
            ## Game Build Request

            **Build ID:** `${{ inputs.build_id }}`

            **Request:**
            > ${{ inputs.request_text }}

            **What was built:**
            ${{ steps.claude-build.outputs.build_description }}

            **QA Results: ISSUES FOUND**
            - Status: ${{ steps.gameplay-qa.outputs.qa_status }}
            - Tests: ${{ steps.gameplay-qa.outputs.tests_passed }}/${{ steps.gameplay-qa.outputs.tests_total }} passing
            - Bugs found: ${{ steps.gameplay-qa.outputs.bugs_found }}
            - Bugs fixed: ${{ steps.gameplay-qa.outputs.bugs_fixed }}

            > This game has QA issues that could not be automatically resolved.
            > Review the QA log artifact for details before merging.

            ---
            Generated by Form & Play Game Builder.
          labels: game-builder,qa-issues

      - name: Auto-merge Pull Request (QA passed)
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"
          gh pr merge "$PR_NUMBER" --squash --delete-branch
          echo "PR #$PR_NUMBER merged (QA passed)"

      - name: Update Firestore build status
        if: always() && steps.pre-validate.outputs.credits_ok == 'true'
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json
        run: |
          BUILD_STATUS="${{ steps.claude-build.outputs.build_status }}"
          BUILD_DESC="${{ steps.claude-build.outputs.build_description }}"
          QA_STATUS="${{ steps.gameplay-qa.outputs.qa_status }}"

          if [ "$BUILD_STATUS" = "completed" ] && [ "$QA_STATUS" = "passed" ]; then
            FINAL_STATUS="completed"
            FINAL_DESC="${BUILD_DESC:-Build completed} (QA: ${{ steps.gameplay-qa.outputs.tests_passed }}/${{ steps.gameplay-qa.outputs.tests_total }} tests passed)"
          elif [ "$BUILD_STATUS" = "completed" ]; then
            FINAL_STATUS="completed"
            FINAL_DESC="${BUILD_DESC:-Build completed} (QA: ${{ steps.gameplay-qa.outputs.qa_status }}, needs review)"
          else
            FINAL_STATUS="failed"
            FINAL_DESC="${BUILD_DESC:-Build failed}"
          fi

          node scripts/update-build-status.js \
            --build-id "${{ inputs.build_id }}" \
            --status "$FINAL_STATUS" \
            --fix-description "$FINAL_DESC" || true

      - name: Clean up
        if: always()
        run: rm -f /tmp/firebase-service-account.json /tmp/game-edit-input.json /tmp/qa-target.txt
